upstream fastapi {
    server app:8000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # Static frontend files
    location / {
        root /usr/share/nginx/html/templates;
        try_files $uri $uri/ /auth/login.html;
        index login.html;
    }

    # Dashboard routes
    location /dashboard.html {
        root /usr/share/nginx/html/templates/user;
        try_files /dashboard.html =404;
    }

    location /admin.html {
        root /usr/share/nginx/html/templates/admin;
        try_files /admin.html =404;
    }

    location /login.html {
        root /usr/share/nginx/html/templates/auth;
        try_files /login.html =404;
    }

    # API proxy
    location /api/ {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Health check
    location /health {
        proxy_pass http://fastapi/health;
    }

    # Upload size limit
    location /api/v1/payments/manual/ {
        client_max_body_size 10M;
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    gzip on;
    gzip_types text/plain application/json text/html text/css application/javascript;
}
